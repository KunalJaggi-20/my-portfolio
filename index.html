<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kunal Jaggi</title>
  <style>
    :root {
      /* VS Code Dark+ (Default) */
      --bg: #1F2128;
      --panel: #1E1E1E;
      --panel-2: #2D2D2D;
      --panel-3: #252526;
      --panel-4: #37373D;
      --panel-5: #3E3E42;
      --border: #2d2d2d;
      --border-2: #3c3c3c;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --brand: #6d0cc8;
      --blue: #3b82f6;
      --purple: #a855f7;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }

    [data-theme="dracula"] {
      --bg: #282a36;
      --panel: #282a36;
      --panel-2: #44475a;
      --panel-3: #21222c;
      --panel-4: #6272a4;
      --panel-5: #44475a;
      --border: #6272a4;
      --border-2: #6272a4;
      --text: #f8f8f2;
      --muted: #6272a4;
      --brand: #bd93f9;
      --blue: #8be9fd;
      --purple: #ff79c6;
    }

    [data-theme="github"] {
      --bg: #0d1117;
      --panel: #0d1117;
      --panel-2: #161b22;
      --panel-3: #0d1117;
      --panel-4: #21262d;
      --panel-5: #30363d;
      --border: #30363d;
      --border-2: #21262d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --brand: #58a6ff;
      --blue: #58a6ff;
      --purple: #bc8cff;
    }

    body, .vscode, .workbench, .explorer, .tabbar, .tab, .card, .modal, .modal-backdrop, .menubar {
      transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s;
    }


    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: var(--bg);
      color: var(--text);
    }

    /* Add spacing between cards only inside the projects tab */
    #editorContent .card {
      margin-bottom: 12px;
      /* Space between projects */
    }

    #editorContent .card:last-child {
      margin-bottom: 0;
      /* Avoid extra space at the end */
    }

    /* Layout shells */
    .center {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow: hidden
    }

    /* Stages */
    .hidden {
      display: none !important
    }

    /* Typing headline */
    .headline {
      display: flex;
      align-items: center;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 3.5rem)
    }

    .cursor {
      display: inline-block;
      width: .25rem;
      height: 1.8em;
      margin-left: .25rem;
      background: #fff;
      animation: blink .5s step-end infinite
    }

    /* Progress */
    .progress-wrap {
      width: min(720px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .progress-title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      margin: 0 0 24px
    }

    .progress {
      width: 100%;
      height: 10px;
      background: #4b5563;
      border-radius: 999px;
      overflow: hidden
    }

    /* --- IMPORTANT: use transform to animate the bar (guarantees start at 0) --- */
    .bar {
      height: 100%;
      background: var(--purple);
      border-radius: 999px;
      will-change: transform;
      transform-origin: left;
      transform: scaleX(0);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-2);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* VSCode window */
    .vscode {
      background: #1F2128;
      border-radius: 12px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .55), 0 0 0 1px rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      height: 80svh;
      max-height: 860px;
      width: min(1100px, 96vw);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--panel-2);
      padding: 8px;
      border-radius: 12px 12px 0 0
    }

    .titlebar .left {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .titlebar .appname {
      font-size: .9rem;
      font-weight: 700
    }

    .winbtn {
      color: #cbd5e1;
      background: none;
      border: 0;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px
    }

    .winbtn:hover {
      color: #fff
    }

    .title {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .workbench {
      display: flex;
      flex: 1;
      overflow: hidden;
      border: 1px solid var(--border);
      border-top: 0;
      background: var(--panel)
    }

    .menubar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border-2)
    }

    .traffic {
      display: flex;
      gap: 6px
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px
    }

    .dot.red {
      background: var(--red)
    }

    .dot.yellow {
      background: var(--yellow)
    }

    .dot.green {
      background: var(--green)
    }

    .toolbar-title {
      flex: 1;
      text-align: center;
      color: var(--muted);
      font-size: .8rem
    }

    .explorer {
      width: 250px;
      flex: 0 0 250px;
      background: var(--panel-3);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-right: 1px solid var(--border)
    }

    .explorer .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9aa1a8;
      text-transform: uppercase;
      font-size: .72rem;
      letter-spacing: .06em
    }

    .explorer .group-title {
      font-size: .72rem;
      color: #9aa1a8
    }

    .file {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      color: #d1d5db;
      border-left: 2px solid transparent;
      transition: all 0.2s ease;
    }

    .file:hover {
      background: var(--panel-5);
      color: #fff;
    }

    .file.active {
      background: var(--panel-4);
      color: #fff;
      border-left: 2px solid var(--purple);
    }

    .editor {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden
    }

    .tabbar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--panel-2);
      padding: 4px;
      border-bottom: 1px solid var(--border)
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--panel);
      border-radius: 8px 8px 0 0;
      color: #fff;
      font-size: .9rem;
      border-top: 2px solid var(--purple);
      transition: background 0.2s ease;
    }

    .tab .close {
      color: var(--muted);
      margin-left: 6px;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    
    .tab .close:hover {
      color: #fca5a5;
    }

    .content {
      flex: 1;
      overflow: auto;
      padding: 16px
    }

    pre {
      white-space: pre-wrap;
      font-size: .9rem;
      animation: fadeIn 0.4s ease-out forwards;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--brand);
      padding: 8px 12px;
      color: #fff;
      border-radius: 0 0 12px 12px;
      font-size: .78rem
    }

    .statusbar .row {
      display: flex;
      gap: 16px;
      align-items: center
    }

    /* Cards */
    .card {
      background: var(--panel-2);
      padding: 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      border-color: rgba(168, 85, 247, 0.4);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--blue), var(--brand));
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
      filter: brightness(1.1);
    }
    
    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Modal */
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
      transition: all 0.3s ease;
    }

    .modal {
      background: var(--panel-2);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .8), 0 0 0 1px rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      max-width: 680px;
      width: 100%;
      max-height: 80%
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-2)
    }

    .modal-body {
      padding: 16px;
      overflow: auto
    }

    /* Terminal */
    .terminal {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--panel)
    }

    .term-log {
      flex: 1;
      overflow: auto;
      padding: 8px;
      color: #86efac;
      white-space: pre-wrap
    }

    .term-input {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel-2);
      padding: 8px
    }

    .term-input input {
      flex: 1;
      background: transparent;
      border: 0;
      outline: none;
      color: #fff;
      font: inherit
    }

    /* Skills */
    .skills h3 {
      margin: 0 0 16px;
      font-size: 1.25rem;
      color: #d1d5db
    }

    svg text {
      fill: #d1d5db;
      font-size: .8rem
    }

    /* Dock */
    .dock {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      display: flex;
      gap: 8px;
      background: rgba(45, 45, 45, .75);
      backdrop-filter: blur(6px);
      border: 1px solid #444;
      padding: 8px;
      border-radius: 14px;
      z-index: 20
    }

    .dock img {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
    }

    .dock img:hover {
      transform: scale(1.15) translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popUp {
      0% {
        transform: scale(.8);
        opacity: 0
      }

      80% {
        transform: scale(1.02);
        opacity: 1
      }

      100% {
        transform: scale(1)
      }
    }

    .animate-pop-up {
      animation: popUp .5s cubic-bezier(.175, .885, .32, 1.275) forwards
    }

    @keyframes minimizeVsCode {
      0% {
        transform: scale(1);
        opacity: 1
      }

      100% {
        transform: scale(.1) translate(-210%, 1500%);
        opacity: 0
      }
    }

    .animate-minimize-vs-code {
      animation: minimizeVsCode .5s ease-in-out forwards
    }

    @keyframes popOutOfDock {
      0% {
        transform: scale(.1) translate(110%, 1500%);
        opacity: 0
      }

      50% {
        transform: scale(1.05);
        opacity: 1
      }

      100% {
        transform: scale(1)
      }
    }

    .animate-pop-out-of-dock {
      animation: popOutOfDock .5s cubic-bezier(.175, .885, .32, 1.275) forwards
    }

    @keyframes popIntoDock {
      0% {
        transform: scale(1);
        opacity: 1
      }

      100% {
        transform: scale(.1) translate(110%, 1500%);
        opacity: 0
      }
    }

    .animate-pop-into-dock {
      animation: popIntoDock .5s ease-in-out forwards
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .blink {
      animation: blink .5s step-end infinite
    }

    @keyframes slideIn {
      0% {
        transform: translateX(-100%);
        opacity: 0
      }

      100% {
        transform: translateX(0);
        opacity: 1
      }
    }

    .slide {
      animation: slideIn .5s ease-out forwards
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .vscode {
        width: 100vw;
        height: 100svh;
        max-height: 100svh;
        border-radius: 0;
      }

      .titlebar {
        border-radius: 0;
      }

      .statusbar {
        border-radius: 0;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      #editorContainer {
        position: relative;
      }

      .explorer {
        position: absolute;
        top: 0;
        bottom: 0;
        left: -100%;
        z-index: 10;
        transition: left 0.3s ease;
        box-shadow: 4px 0 10px rgba(0, 0, 0, 0.5);
      }

      .explorer.open {
        left: 0;
      }

      .card {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .dock {
        width: 90vw;
        flex-wrap: wrap;
        justify-content: center;
        bottom: 80px;
        /* Above statusbar */
      }

      .dock img {
        width: 36px;
        height: 36px;
      }

      .hamburger {
        display: block;
        background: none;
        border: none;
        color: #cbd5e1;
        cursor: pointer;
        padding: 4px;
      }

      .hamburger:hover {
        color: #fff;
      }

      .traffic {
        display: none;
        /* Hide traffic lights on mobile to save space */
      }
    }

    @media (min-width: 769px) {
      .hamburger {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="center" id="app">
    <!-- Command Palette Modal -->
    <div id="cmdPalette" class="hidden" style="position: absolute; top: 12%; left: 50%; transform: translateX(-50%); width: min(600px, 90vw); z-index: 100;">
      <div style="background: var(--panel-2); border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1); display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px);">
        <div style="padding: 12px; border-bottom: 1px solid var(--border);">
          <input id="cmdInput" type="text" placeholder="Search files by name (e.g. projects.js)" style="width: 100%; background: var(--panel); color: var(--text); border: 1px solid var(--blue); border-radius: 4px; padding: 10px; font-family: inherit; font-size: .95rem; outline: none;">
        </div>
        <div id="cmdResults" style="max-height: 300px; overflow-y: auto; padding: 6px;"></div>
      </div>
    </div>
    <!-- Stage: initial typing -->
    <div id="stage-initial" class="stage-initial">
      <div class="headline"><span id="typed">Hello, World!</span><span id="caret" class="cursor"></span></div>
    </div>

    <!-- Stage: loading -->
    <div id="stage-loading" class="hidden">
      <div class="progress-wrap">
        <h1 class="progress-title">Hello, World!</h1>
        <div class="progress">
          <div id="bar" class="bar"></div>
        </div>
      </div>
    </div>

    <!-- Stage: VS Code window (loaded/closing) -->
    <div id="stage-window" class="hidden">
      <div id="windowShell" class="vscode animate-pop-up">
        <!-- Titlebar -->
        <div class="titlebar">
          <div class="left title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 3h8a2 2 0 012 2v14a2 2 0 01-2 2H8l-6-6V9l6-6z"></path>
            </svg>
            <span class="appname">Portfolio - Kunal Jaggi</span>
          </div>
          <div class="right">
            <button class="winbtn" id="btnMin">−</button>
            <button class="winbtn">▢</button>
            <button class="winbtn" id="btnClose">✕</button>
          </div>
        </div>

        <!-- Workbench -->
        <div class="workbench">
          <div class="editor-col" style="display:flex;flex-direction:column;flex:1;overflow:hidden;width:100%">
            <div class="menubar">
              <div class="traffic">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
              </div>
              <button class="hamburger" id="btnToggleExplorer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
                </svg>
              </button>
              <div class="toolbar-title" id="toolbarTitle">Portfolio - about.json</div>
              <div style="width:48px" class="traffic-spacer"></div>
            </div>
            <div id="editorContainer" style="display:flex;flex:1;overflow:hidden;position:relative;">
              <!-- Explorer -->
              <aside class="explorer" style="justify-content: space-between;">
                <div>
                  <div class="section-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M10 4l2 2h8v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6h6z" />
                    </svg>
                    <span>Explorer</span>
                  </div>
                  <div style="margin-top:14px">
                    <div class="group-title">FILES: </div>
                    <div id="fileList"></div>
                  </div>
                </div>

                <!-- Settings / Themes -->
                <div style="position: relative;">
                  <button id="btnSettings" style="background:none; border:none; color:#cbd5e1; cursor:pointer; display:flex; align-items:center; gap:8px; padding:6px; border-radius:4px; width:100%; text-align:left;">
                    <span>⚙️</span> <span style="font-size: .8rem;">Settings</span>
                  </button>
                  <div id="themeMenu" class="hidden" style="position: absolute; bottom: 100%; left: 0; width: 100%; background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 6px; padding: 6px; box-shadow: 0 -4px 10px rgba(0,0,0,0.3); z-index: 20;">
                    <div class="theme-option" data-theme="vscode" onmouseover="this.style.background='var(--blue)'" onmouseout="this.style.background='transparent'" style="padding: 6px; cursor: pointer; border-radius: 4px; font-size: .8rem;">Dark+ (Default)</div>
                    <div class="theme-option" data-theme="dracula" onmouseover="this.style.background='var(--blue)'" onmouseout="this.style.background='transparent'" style="padding: 6px; cursor: pointer; border-radius: 4px; font-size: .8rem;">Dracula</div>
                    <div class="theme-option" data-theme="github" onmouseover="this.style.background='var(--blue)'" onmouseout="this.style.background='transparent'" style="padding: 6px; cursor: pointer; border-radius: 4px; font-size: .8rem;">GitHub Dark</div>
                  </div>
                </div>
              </aside>

              <!-- Editor -->
              <section class="editor">
                <div class="tabbar">
                  <div class="tab" id="tabActive">
                    <span id="tabIcon">📄</span>
                    <span id="tabName">about.json</span>
                    <span class="close">x</span>
                  </div>
                </div>
                <div class="content" id="editorContent">
                  <!-- dynamic -->
                </div>
              </section>
            </div>
            <div class="statusbar">
              <div class="row">
                <span>© 2025 Kunal Jaggi</span>
                <span>Ln 1, Col 1</span>
              </div>
              <div class="row">
                <span>Git Branch: main</span>
                <span>UTF-8</span>
                <span id="langTag">json</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stage: terminal pop-up (after close) -->
    <div id="stage-pop" class="hidden">
      <div class="modal-backdrop">
        <div class="modal animate-pop-out-of-dock" style="width:auto;max-width:520px">
          <div class="modal-body" id="farewellBody" style="font-size:.9rem"></div>
        </div>
      </div>
    </div>

    <!-- Stage: terminal closing animation (shrinks) -->
    <div id="stage-pop-closing" class="hidden">
      <div class="modal-backdrop">
        <div class="modal animate-pop-into-dock" style="width:auto;max-width:520px">
          <div class="modal-body" id="farewellBody2" style="font-size:.9rem"></div>
        </div>
      </div>
    </div>

    <!-- Dock -->
    <div id="dock" class="dock hidden">
      <img src="https://placehold.co/48x48/007ACC/white?text=VS" alt="VS Code">
      <img src="https://placehold.co/48x48/1A73E8/white?text=Chrome" alt="Chrome">

        const elapsed = now - start;
        const progress = Math.min(1, elapsed / duration);
        bar.style.transform = 'scaleX(' + progress + ')';
        if (progress < 1) {
          requestAnimationFrame(frame);

        }
      });

      root.appendChild(term);
      setTimeout(() => inp.focus(), 50);
    }

    // Snake Minigame HTML5 Canvas logic
    let snakeInterval = null;
    function startSnakeGame(root) {
      isTerminalBusy = true; // prevents typing in term
      const canvas = document.createElement('canvas');
      canvas.width = 300; canvas.height = 300;
      canvas.style.cssText = "border: 1px solid var(--border); display: block; margin: 10px 0; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);";
      root.appendChild(canvas);
      
      const ctx = canvas.getContext('2d');
      let snake = [{x: 10, y: 10}];
      let dir = {x: 1, y: 0};
      let food = {x: 15, y: 15};
      let score = 0;

      const keyDownHandler = (e) => {
        if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
        if(e.key === 'ArrowUp' && dir.y === 0) dir = {x:0, y:-1};
        if(e.key === 'ArrowDown' && dir.y === 0) dir = {x:0, y:1};
        if(e.key === 'ArrowLeft' && dir.x === 0) dir = {x:-1, y:0};
        if(e.key === 'ArrowRight' && dir.x === 0) dir = {x:1, y:0};
        if(e.key === 'Escape') endGame();
      };
      // Timeout needed so the 'Enter' key press that fired this command doesn't instantly double fire inside game
      setTimeout(() => document.addEventListener('keydown', keyDownHandler), 100);

      function endGame() {
        clearInterval(snakeInterval);
        document.removeEventListener('keydown', keyDownHandler);
        // Inform user they can type again
        setTimeout(() => {
          isTerminalBusy = false;
        }, 100);
      }

      snakeInterval = setInterval(() => {
        const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
        // wall collision or body collision
        if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) {
          endGame(); return;
        }
        snake.unshift(head);
        if(head.x === food.x && head.y === food.y) {
          score++;
          food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
        } else {
          snake.pop();
        }

        // draw
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,300,300);
        ctx.fillStyle = '#ef4444'; ctx.fillRect(food.x*15, food.y*15, 14, 14); // apple
        ctx.fillStyle = '#22c55e'; // snake
        snake.forEach(s => ctx.fillRect(s.x*15, s.y*15, 14, 14));
        
        ctx.fillStyle = '#ffffff';
        ctx.font = "12px monospace";
        ctx.fillText(`Score: ${score}`, 10, 20);
      }, 100);
    }

    function chatLocal(q) {
      // Very simple local rules to avoid external APIs
      const info = {
        name: 'Kunal Jaggi',
        role: 'Aspiring Software Developer / AI/ML Engineer',
        skills: 'Python, JavaScript, C++, Java, SQL, React, Node.js, TensorFlow, PyTorch, Scikit-learn, MongoDB, PostgreSQL',
        projects: 'Project Alpha, Neural Network for Image Classification, Portfolio Website'
      };
      q = q.toLowerCase();
      if (q.includes('name')) return `I'm ${info.name}.`;
      if (q.includes('role')) return `Role: ${info.role}.`;
      if (q.includes('skill')) return `Key skills: ${info.skills}.`;
      if (q.includes('project')) return `My projects are: ${info.projects}.`;
      return 'Ask me about my skills, projects, or role 🙂';
    }

    function openReadme(project) {
      const tpl = $('#readmeTemplate').content.cloneNode(true);
      const wrap = tpl.querySelector('#readmeBackdrop');
      tpl.querySelector('#readmeContent').textContent = projectReadmes[project] || '';
      tpl.querySelector('#readmeClose').onclick = () => document.body.removeChild(wrap);
      document.body.appendChild(wrap);
      wrap.addEventListener('click', (e) => { if (e.target === wrap) document.body.removeChild(wrap); });
    }



    // Farewell typing
    const farewellLines = ["[Process completed with exit code 0]", "Goodbye, Visitors. It was a pleasure having you. 😉"];
    function runFarewellTyping() {
      const pad = $('#farewellBody'); pad.innerHTML = '';
      const typeLine = (idx) => {
        if (idx >= farewellLines.length) { setTimeout(() => { setStage('terminal-closing'); $('#farewellBody2').innerHTML = pad.innerHTML; setTimeout(() => { setStage('closed'); }, 1000); }, 15000); return; }
        let i = 0; const line = document.createElement('div'); pad.appendChild(line);
        const t = setInterval(() => { line.textContent = farewellLines[idx].slice(0, ++i); if (i > farewellLines[idx].length) { clearInterval(t); setTimeout(() => typeLine(idx + 1), 500); } }, 50);
      };
      setTimeout(() => typeLine(0), 500);
    }

    // ------------------------------ Boot ------------------------------
    setStage('initial');
    runInitial();

    // Opens the contact modal
    function openContactPopup() {
      // Backdrop + modal
      const backdrop = document.createElement('div');
      backdrop.className = "modal-backdrop";
      backdrop.style.zIndex = "9999";

      const modal = document.createElement('div');
      modal.className = "modal animate-pop-up";
      modal.style.maxWidth = "520px";

      modal.innerHTML = `
    <div class="modal-head">
      <span style="font-weight:700;font-size:1rem">Contact Me</span>
      <button class="winbtn" id="contactClose">✕</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <label style="font-size:.9rem;color:#d1d5db">Your Email</label>
      <input id="contactEmail" type="email" placeholder="you@example.com"
        style="width:100%;padding:10px;margin:6px 0 12px;background:#1F2128;color:#fff;border:1px solid #444;border-radius:6px" />

      <label style="font-size:.9rem;color:#d1d5db">Subject</label>
      <input id="contactSubject" type="text" placeholder="Subject"
        style="width:100%;padding:10px;margin:6px 0 12px;background:#1F2128;color:#fff;border:1px solid #444;border-radius:6px" />

      <label style="font-size:.9rem;color:#d1d5db">Message</label>
      <textarea id="contactMsg" rows="6" placeholder="Write your message..."
        style="width:100%;padding:10px;margin:6px 0 12px;background:#1F2128;color:#fff;border:1px solid #444;border-radius:6px"></textarea>

      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button id="contactCancel" class="btn" style="background:#6b7280">Cancel</button>
        <button id="contactSend" class="btn">Send Message</button>
      </div>

      <div id="contactStatus" style="margin-top:12px;color:#9ca3af;font-size:.9rem"></div>
    </div>
  `;

      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);

      // Close handlers
      modal.querySelector('#contactClose').onclick = () => document.body.removeChild(backdrop);
      modal.querySelector('#contactCancel').onclick = () => document.body.removeChild(backdrop);

      // Send handler
      modal.querySelector('#contactSend').onclick = async () => {
        const email = document.getElementById('contactEmail').value.trim();
        const subject = document.getElementById('contactSubject').value.trim();
        const message = document.getElementById('contactMsg').value.trim();
        const status = document.getElementById('contactStatus');

        // Basic validation
        if (!email || !message) {
          status.style.color = '#fca5a5';
          status.textContent = 'Please enter your email and message.';
          return;
        }
        status.style.color = '#9ca3af';
        status.textContent = 'Sending...';

        try {
          const res = await sendMessageWeb3({ email, subject, message });
          if (res && res.success) {
            status.style.color = '#86efac';
            status.textContent = 'Message sent — thank you!';

            // optional: close after a short delay
            setTimeout(() => { if (document.body.contains(backdrop)) document.body.removeChild(backdrop); }, 1400);
          } else {
            status.style.color = '#fca5a5';
            status.textContent = 'Failed to send. Try again later.';
            console.warn('web3forms response', res);
          }
        } catch (err) {
          status.style.color = '#fca5a5';
          status.textContent = 'Send failed — check console.';
          console.error(err);
        }
      };
    }
    // call Web3Forms API
    async function sendMessageWeb3({ email, subject, message }) {
      const payload = {
        access_key: "d19b2905-b21d-43b7-b1c2-bac9d3669e73",
        from_email: email,
        subject: subject || "(No subject)",
        message: message,
        // optional: you can set `to_email` if you configured it in dashboard.
        // to_email: "your-email@example.com"
      };

      const res = await fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
      });

      return res.json();
    }
  </script>
